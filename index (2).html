<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المتجر</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: lightblue;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.card {
    background-color: white;
    border: 2px solid black;
    padding: 15px;
    width: 200px;
}

.title {
    color: purple;
}

.price {
    color: green;
    font-weight: bold;
}
</style>

</head>

<body>

<h2 style="color: darkblue;">🛒 متجري</h2>

<div class="container">

    <div class="card">
        <img src="كاميرا.jpg" width="150">
        <h3 class="title">كاميرا كانون</h3>
        <p>كاميرا احترافية عالية الجودة</p>
        <p class="price">$850</p>
    </div>

    <div class="card">
        <img src="كمبيوتر.jpg" width="150">
        <h3 class="title">لابتوب ديل</h3>
        <p>سريع وموثوق للعمل</p>
        <p class="price">$950</p>
    </div>

    <div class="card">
        <img src="سماعه.jpg" width="150">
        <h3 class="title">سماعات سوني</h3>
        <p>صوت نقي مع عزل الضوضاء</p>
        <p class="price">$180</p>
    </div>

</div>

</body>
</html>
